# 通用 "上游公开 manifest → 仓库代理 feed" 转换器。
#
# 解决的问题:有些 cask 的上游用 electron-updater 但没把 latest-mac.yml 放在
# 上游 CDN 的根(例如 zcode 是按 `<version>/macos-<arch>/latest.yml` 分目录),
# 而 brew livecheck 的 :electron_builder 策略只能 GET 单一稳定 URL。
# 这个 workflow 每天(或者手动)替上游做一次 "拉多个 platform 的 manifest → 合
# 并成 brew livecheck 能消费的 latest-mac.yml → 直接 push main",给 auto-bump
# 喂数据。
#
# 为什么不走 livecheck 自定义策略:
#   brew livecheck 不支持 POST、不支持自定义脚本,只能 GET 现成 URL。
#   详见 https://docs.brew.sh/Brew-Livecheck 。
#
# 跟 feed-trae-work.yml 的关系:
#   trae-work 因为上游是私有 POST API,需要额外鉴权 + 反向解析 dmg URL,
#   那个 workflow 独立存在,不迁到这个通用模板。
#   本模板针对"上游公开 GET manifest,但 manifest 形态不利于 livecheck"的 case。
#
# 用法(在调用器 workflow 里):
#
#   jobs:
#     feed:
#       uses: ./.github/workflows/_feed-from-url.yml
#       with:
#         name: <cask 名,出现在 commit message>
#         upstream_url_template: 'https://example.com/manifest?platform={platform}&channel=3'
#         # ↑ {platform} 会被每个 matrix 元素替换
#         output_path: feeds/<cask>/latest-mac.yml
#         platforms: '["darwin-aarch64","darwin-x86_64"]'
#         channel: '3'                  # 仅出现在 commit message,实际写到 URL 里
#
name: _feed-from-url (reusable)

on:
  workflow_call:
    inputs:
      name:
        description: 'cask 名(用于 commit message / 文档)'
        required: true
        type: string
      upstream_url_template:
        description: |
          上游 manifest URL 模板。必须含 `{platform}` 占位符,会被每个 matrix 元素替换。
          例: https://zcode.z.ai/api/v1/releases/electron/manifest?platform={platform}&channel=3
        required: true
        type: string
      output_path:
        description: '仓库内相对路径,例 feeds/zcode/latest-mac.yml'
        required: true
        type: string
      platforms:
        description: 'platform 列表(JSON 数组),默认 ["darwin-aarch64","darwin-x86_64"]'
        required: false
        type: string
        default: '["darwin-aarch64","darwin-x86_64"]'
      channel:
        description: '上游 channel(stable=1 / preview=3),仅出现在 commit message'
        required: false
        type: string
        default: ''

permissions:
  contents: write  # 直接 push main,跟 feed-trae-work 一致

jobs:
  feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Pull + merge manifests
        id: merge
        env:
          NAME: ${{ inputs.name }}
          URL_TEMPLATE: ${{ inputs.upstream_url_template }}
          OUTPUT_PATH: ${{ inputs.output_path }}
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/feed-merge
          cd /tmp/feed-merge
          rm -f arm64.yaml x64.yaml *.yaml

          # 逐 platform 拉 manifest。任意一个失败 → job fail,有人会看到邮件通知。
          # 防 cdn 返回空对象:size 必须 > 0。
          platforms=$(echo "$PLATFORMS" | jq -r '.[]')
          declare -A manifest
          for plat in $platforms; do
            url="${URL_TEMPLATE/\{platform\}/$plat}"
            echo "→ GET $plat → $url"
            tmp="/tmp/feed-merge/${plat}.yaml"
            if ! curl -fsSL -o "$tmp" "$url"; then
              echo "::error::$plat manifest 拉取失败: $url"; exit 1
            fi
            bytes=$(wc -c < "$tmp" | tr -d '[:space:]')
            if [ "${bytes:-0}" -le 50 ]; then
              echo "::error::$plat manifest 太小($bytes bytes),不像有效 yaml: $url"; exit 1
            fi
            manifest[$plat]="$tmp"
          done

          # Ruby 合并:每个 manifest 里挑 .dmg 那条 entry,合并进统一 files[]。
          # 校验:version 必须一致;dmg 至少一条;url 必须以 .dmg 结尾。
          # 输出:用 Ruby YAML.dump,跟 trae-work 现有格式一致。
          # 关键:env 变量必须用 `env FOO=bar ruby ...` 前缀形式(GitHub Actions 的
          # bash -e 不支持续行末尾的 `VAR=val` 写进 ruby 进程 env)。
          export PLATFORMS_JSON="$PLATFORMS"
          export OUTPUT_PATH="$GITHUB_WORKSPACE/$OUTPUT_PATH"
          ruby -ryaml -rjson -e '
            plats_raw = ENV["PLATFORMS_JSON"]
            abort("PLATFORMS_JSON is nil") if plats_raw.nil? || plats_raw.empty?
            plats = JSON.parse(plats_raw)
            abort("PLATFORMS_JSON parse 失败: #{plats_raw.inspect}") unless plats.is_a?(Array)
            files = []
            arm_path = nil
            arm_sha  = nil
            arm_ver  = nil
            arm_date = nil
            plats.each do |plat|
              path = "/tmp/feed-merge/#{plat}.yaml"
              abort("missing manifest for #{plat}") unless File.exist?(path)
              m = YAML.load_file(path)
              abort("#{plat}: 缺 version") if m["version"].to_s.empty?
              abort("#{plat}: files 为空") if m["files"].to_a.empty?
              m["files"].each do |f|
                next unless f["url"].to_s.end_with?(".dmg")
                files << {
                  "url"    => f["url"],
                  "sha512" => f["sha512"],
                  "size"   => f["size"],
                  "blockMapSize" => 0
                }
              end
              # path/sha512 沿用第一个 platform(用 x86_64 不对,trae-work 用的是 arm 那条)
              # 这里取任意一个 platform 的 zip url 当 path(electron-updater 通用约定)
              zip_entry = m["files"].find { |f| f["url"].to_s.end_with?(".zip") }
              if arm_path.nil?
                arm_path = zip_entry["url"] if zip_entry
                arm_sha  = m["sha512"]
                arm_ver  = m["version"]
                arm_date = m["releaseDate"]
              else
                # version 必须跨 platform 一致,否则说明上游发版状态异常
                if m["version"] != arm_ver
                  abort("version mismatch: #{arm_ver} vs #{m["version"]}")
                end
              end
            end
            abort("no .dmg entry found in any manifest") if files.empty?
            out = {
              "version"     => arm_ver,
              "files"       => files,
              "path"        => arm_path,
              "sha512"      => arm_sha,
              "releaseDate" => arm_date
            }
            require "fileutils"
            FileUtils.mkdir_p(File.dirname(ENV["OUTPUT_PATH"]))
            File.write(ENV["OUTPUT_PATH"], out.to_yaml)
            puts "--- merged yaml ---"
            puts File.read(ENV["OUTPUT_PATH"])
          '

          echo "version=$(ruby -ryaml -e 'puts YAML.load_file(ENV["OUTPUT_PATH"])["version"]')" >> "$GITHUB_OUTPUT"

      - name: HEAD-validate every dmg URL
        env:
          OUTPUT_PATH: ${{ inputs.output_path }}
        run: |
          # 三道防线之一:每个 files[].url 必须 HEAD 200,防 cdn 异常导致空对象(0 字节)。
          # brew livecheck 自己不会下 dmg,apply_electron_builder_bump 才会下,
          # 但我们这一步就 fail 掉,避免下游拿到空 url 列表。
          export OUTPUT_PATH="$GITHUB_WORKSPACE/$OUTPUT_PATH"
          ruby -ryaml -rnet/http -ruri -e '
            abort("OUTPUT_PATH is nil") if ENV["OUTPUT_PATH"].nil? || ENV["OUTPUT_PATH"].empty?
            m = YAML.load_file(ENV["OUTPUT_PATH"])
            m["files"].to_a.each do |f|
              u = URI(f["url"].to_s)
              res = Net::HTTP.start(u.host, u.port, use_ssl: u.scheme == "https",
                                    open_timeout: 10, read_timeout: 15) do |http|
                http.head(u.request_uri)
              end
              code = res.code
              puts "  HEAD #{code} #{u}"
              abort("dmg HEAD 非 2xx (#{code}): #{u}") unless code.start_with?("2")
            end
          '

      - name: Commit + push (no-op skip)
        env:
          NAME: ${{ inputs.name }}
          CHANNEL: ${{ inputs.channel }}
          VERSION: ${{ steps.merge.outputs.version }}
          OUTPUT_PATH: ${{ inputs.output_path }}
        run: |
          git add "$OUTPUT_PATH"
          if git diff --cached --quiet; then
            echo "✅ feed 无变化,跳过提交"
            exit 0
          fi
          channel_tag=""
          [ -n "$CHANNEL" ] && channel_tag=" (channel=$CHANNEL)"
          git commit -m "chore(feed): ${NAME} ${VERSION}${channel_tag}

          由 _feed-from-url.yml 自动生成。"
          # 直接 push main —— 这是代理 feed 文件,变更安全;不走 PR(避免自循环)。
          git push origin HEAD:main