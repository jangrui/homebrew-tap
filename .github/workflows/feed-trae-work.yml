# 每天喂一次 feeds/trae-work/latest-mac.yml,把 byteDance 的私有
# POST /icube/api/v1/package/check_update 响应转为 brew livecheck 能消费的
# electron-builder yaml。auto-bump.yml 的 apply_electron_builder_bump 路径会
# 直接读这份 yaml 拿真实 dmg URL + sha512 + sha256。
#
# 触发:
#   - schedule:每天 UTC 20:00(北京时间 04:00),跟 auto-bump 错开 1 小时避免撞车
#   - workflow_dispatch:可手动触发试新参数
#
# 为什么走自建代理 feed:
#   byteDance 把 update 流程重写,Resources/app-update.yml 是空占位符
#   (`provider: custom, url: ''`),update 走自定义 CustomProvider +
#   POST https://<region>.trae.ai/icube/api/v1/package/check_update。
#   响应里给 feedURL + version。brew livecheck 不支持这种自定义 POST API,
#   所以我们在 GitHub Actions 里替它转发一次,写成标准 yaml。
name: feed-trae-work

on:
  schedule:
    - cron: "1 20 * * *"  # UTC 20:01,跟 auto-bump 错峰
  workflow_dispatch:

permissions:
  contents: write  # 喂完 yaml 直接 push 到 main

jobs:
  feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Query byteDance iCube update API
        id: query
        env:
          # 当前 cask 里的 version(byteDance 内部 build 号)。
          # POST 时用作 currentVersion,server 端只在 currentVersion 旧于 latest 时返回新 feed。
          CURRENT_VERSION: "2.3.56914"
        run: |
          # iCube API 选 USTTP region(跟 .trae.ai 主域分离的 iCube 后端,
          # 海外 user 命中这个;product.json 里 iCubeApi="normal": "https://icube-normal.trae.ai"
          # US region="https://icube-normal.traeapi.us"。两种都试,取第一个返回非错的)。
          #
          # 请求体格式参考 main.js 里的 getApi 调用 + appVersion 推导。app_id 用
          # com.trae.solo.app(本机 TRAE SOLO.app 的 bundle ID)。
          for base in "https://icube-normal.traeapi.us" "https://icube-normal.trae.ai"; do
            echo "→ try $base"
            if resp=$(curl -fsS -m 15 -X POST "${base}/icube/api/v1/package/check_update" \
              -H "Content-Type: application/json" \
              -d "{\"version\":\"${CURRENT_VERSION}\",\"channel\":\"stable\",\"platform\":\"darwin\",\"arch\":\"arm64\",\"app_id\":\"com.trae.solo.app\"}" 2>&1); then
              echo "$resp" > /tmp/resp.json
              echo "✅ got response from $base"
              echo "base=$base" >> "$GITHUB_OUTPUT"
              break
            else
              echo "⚠️  $base failed: $resp"
            fi
          done
          if [ ! -s /tmp/resp.json ]; then
            echo "::error::iCube API 都返回错误,无法喂 feed"; exit 1
          fi

          # 输出响应原始内容(便于 workflow_dispatch 时排查)
          echo "--- resp.json ---"
          cat /tmp/resp.json
          echo
          echo "--- end ---"

          # 提取 byteDance build 号(给 feed yaml 用,跟 dmg URL 路径段对齐)。
          version=$(jq -r '.version // .data.version // empty' /tmp/resp.json)
          [ -z "$version" ] && { echo "::error::响应里没 .version 字段"; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Compute dmg URLs (arm64 / x64)
        id: urls
        env:
          VERSION: ${{ steps.query.outputs.version }}
        run: |
          # dmg URL 模板(跟 byteDance CDN 一致):
          #   https://lf-static.traecdn.us/obj/trae-ai-tx/pkg/app/releases/stable/{build}/darwin/TRAE_Work-darwin-{arch}.dmg
          #
          # 我们无法直接拿到 build 号(API 响应里可能只给一个 marketing version + 一个 feedURL),
          # 所以从 feedURL 反推 build 号,或者直接拿 feedURL 当 arm64 dmg,
          # x64 dmg 用同一 build 号的 darwin-x64 同源。
          #
          # 实现:从 resp.json 拿 arm64 的 feedURL,提取 build 号(<base>/<build>/darwin/...),
          # 然后 x64 dmg URL 把 arch 换成 x64。
          arm_url=$(jq -r '.feedURL // .data.feedURL // empty' /tmp/resp.json)
          if [ -z "$arm_url" ]; then
            echo "::error::响应里没 .feedURL 字段"; exit 1
          fi
          # 优先用 API 给的 feedURL(可能是带签名的临时 URL,过期就废;
          # 备选:从 /releases/stable/<build>/ 模板拼。byteDance CDN 是公开的,
          # 所以即使 feedURL 失效也能用模板重拼)。
          #
          # 取 build 号:feedURL 形如 .../stable/2.3.56914/...,
          # sed 抓 stable/ 和下一个 / 之间的数字串。
          build=$(echo "$arm_url" | sed -nE 's|.*/stable/([0-9.]+)/.*|\1|p')
          if [ -z "$build" ]; then
            echo "::error::从 feedURL 抽不出 build 号: $arm_url"; exit 1
          fi
          echo "build=$build"

          arm="https://lf-static.traecdn.us/obj/trae-ai-tx/pkg/app/releases/stable/${build}/darwin/TRAE_Work-darwin-arm64.dmg"
          x64="https://lf-static.traecdn.us/obj/trae-ai-tx/pkg/app/releases/stable/${build}/darwin/TRAE_Work-darwin-x64.dmg"

          # 验证 URL 真存在(HEAD 200),失败就跳过本次
          for label in arm64 x64; do
            url_var="${label/arm64/arm}"; url_var="${url_var/x64/x64}"  # 保持 arm / x64 变量名
            [ "$label" = "arm64" ] && u="$arm" || u="$x64"
            code=$(curl -fsSL -o /dev/null -w "%{http_code}" -I "$u" 2>/dev/null || echo "000")
            echo "  $label HEAD $code $u"
            if [ "$code" != "200" ]; then
              echo "::error::$label dmg URL HEAD 非 200(code=$code): $u"
              exit 1
            fi
          done

          {
            echo "arm=$arm"
            echo "x64=$x64"
            echo "build=$build"
          } >> "$GITHUB_OUTPUT"

      - name: Download dmgs + compute sha512 + sha256
        id: hashes
        run: |
          ARM_URL="${{ steps.urls.outputs.arm }}"
          X64_URL="${{ steps.urls.outputs.x64 }}"
          VERSION="${{ steps.query.outputs.version }}"

          for arch in arm x64; do
            if [ "$arch" = "arm" ]; then
              url="$ARM_URL"; base="TRAE_Work-darwin-arm64-${VERSION}.dmg"
            else
              url="$X64_URL"; base="TRAE_Work-darwin-x64-${VERSION}.dmg"
            fi
            tmp="/tmp/trae-${arch}.dmg"
            echo "→ 下载 $url"
            if ! curl -fL --retry 3 --retry-delay 2 -o "$tmp" "$url"; then
              echo "::error::$arch dmg 下载失败: $url"; exit 1
            fi
            bytes=$(wc -c < "$tmp" | tr -d '[:space:]')
            if [ "${bytes:-0}" -le 1000000 ]; then
              echo "::error::$arch dmg 太小($bytes bytes),不像有效 dmg"; exit 1
            fi
            sha512=$(sha512sum "$tmp" | awk '{print $1}')
            sha256=$(sha256sum "$tmp" | awk '{print $1}')
            echo "  $arch: $bytes bytes, sha512=${sha512:0:16}…, sha256=${sha256:0:16}…"
            {
              echo "${arch}_bytes=$bytes"
              echo "${arch}_sha512=$sha512"
              echo "${arch}_sha256=$sha256"
              echo "${arch}_base=$base"
            } >> "$GITHUB_OUTPUT"
          done

      - name: Generate feeds/trae-work/latest-mac.yml
        env:
          VERSION: ${{ steps.query.outputs.version }}
          ARM_BYTES: ${{ steps.hashes.outputs.arm_bytes }}
          ARM_SHA512: ${{ steps.hashes.outputs.arm_sha512 }}
          ARM_BASE: ${{ steps.hashes.outputs.arm_base }}
          X64_BYTES: ${{ steps.hashes.outputs.x64_bytes }}
          X64_SHA512: ${{ steps.hashes.outputs.x64_sha512 }}
          X64_BASE: ${{ steps.hashes.outputs.x64_base }}
        run: |
          mkdir -p feeds/trae-work
          releaseDate=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          cat > feeds/trae-work/latest-mac.yml <<EOF
          version: ${VERSION}
          files:
            - url: ${ARM_BASE}
              sha512: ${ARM_SHA512}
              size: ${ARM_BYTES}
              blockMapSize: 0
            - url: ${X64_BASE}
              sha512: ${X64_SHA512}
              size: ${X64_BYTES}
              blockMapSize: 0
          path: ${ARM_BASE}
          sha512: ${ARM_SHA512}
          releaseDate: '${releaseDate}'
          EOF

          echo "--- generated latest-mac.yml ---"
          cat feeds/trae-work/latest-mac.yml

      - name: Commit + push (no-op 时跳过)
        env:
          VERSION: ${{ steps.query.outputs.version }}
          ARM_SHA256: ${{ steps.hashes.outputs.arm_sha256 }}
          X64_SHA256: ${{ steps.hashes.outputs.x64_sha256 }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add feeds/trae-work/latest-mac.yml

          if git diff --cached --quiet; then
            echo "✅ feed 无变化,跳过提交"; exit 0
          fi

          git commit -m "chore(feed): trae-work ${VERSION}

          - arm64 sha256: ${ARM_SHA256}
          - x64 sha256: ${X64_SHA256}
          - 由 feed-trae-work.yml 自动生成"

          # 直接 push main —— 这是代理 feed 文件,变更安全;不走 PR(避免自循环)。
          git push origin HEAD:main