name: Auto Bump

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect & bump changed casks
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          apply_electron_builder_bump() {
            local name="$1" latest="$2"
            local cask_path="Casks/${name}.rb"
            local feed_url
            feed_url=$(awk '
              /livecheck do/ {in_lc=1; next}
              in_lc && /^  end/ {in_lc=0; next}
              in_lc && /url "[^"]+"/ {
                match($0, /url "[^"]+"/)
                url = substr($0, RSTART+5, RLENGTH-6)
                print url; exit
              }
            ' "$cask_path")
            if [ -z "$feed_url" ]; then
              feed_url=$(grep -E 'url "[^"]*latest-mac\.yml"' "$cask_path" | head -1 | sed -E 's/.*url "([^"]+)".*/\1/')
            fi
            [ -z "$feed_url" ] && { echo "⚠️  $name: 找不到 feed url(cask 没有 livecheck 块,也没有 latest-mac.yml)"; return 1; }
            echo "🚀 $name: electron_builder 路径 (feed=$feed_url)"

            local intel_feed_url=""
            if grep -qE 'on_arm do' "$cask_path" && grep -qE 'on_intel do' "$cask_path" \
               && echo "$feed_url" | grep -qE 'darwin-(aarch64|x86_64)'; then
              if echo "$feed_url" | grep -q 'darwin-aarch64'; then
                intel_feed_url="${feed_url/darwin-aarch64/darwin-x86_64}"
              elif echo "$feed_url" | grep -q 'darwin-x86_64'; then
                intel_feed_url="${feed_url/darwin-x86_64/darwin-aarch64}"
              fi
              [ -n "$intel_feed_url" ] && echo "    + intel fallback feed: $intel_feed_url"
            fi

            fetch_dmgs() {
              local feed="$1" prefer_arm_only="$2"
              while IFS='|' read -r arch_kind dmg_url server_sha; do
                [ -z "$dmg_url" ] && continue
                echo "${arch_kind}|${dmg_url}|${server_sha}"
              done < <(
                curl -fsSL "$feed" | ruby -ryaml -ruri -e '
                  y = YAML.load(STDIN)
                  prefer_arm_only = ARGV[0] == "true"
                  base = ARGV[1]
                  y["files"].to_a.each do |f|
                    u = f["url"].to_s
                    next unless u.end_with?(".dmg")
                    base_name = File.basename(u)
                    arch =
                      if base_name.include?("arm64") then "arm"
                      elsif base_name.include?("x64") || base_name.include?("x86_64") then "intel"
                      elsif prefer_arm_only then "arm"
                      else "intel"
                      end
                    encoded =
                      if u.match?(%r{\Ahttps?://})
                        u
                      else
                        base + "/" + URI::DEFAULT_PARSER.escape(u, /[^a-zA-Z0-9._~:\/-]/)
                      end
                    puts "#{arch}|#{encoded}|#{f["sha512"]}"
                  end
                ' "$prefer_arm_only" "${feed_url%/latest-mac.yml}"
              )
            }

            fetch_dmg_from_arch_feed() {
              local feed="$1" target_arch="$2"
              curl -fsSL "$feed" | ruby -ryaml -e '
                y = YAML.load(STDIN)
                y["files"].to_a.each do |f|
                  u = f["url"].to_s
                  next unless u.end_with?(".dmg")
                  base = File.basename(u)
                  next unless ARGV[0] == "arm"   ? base.include?("arm64") :
                                                  (base.include?("x64") || base.include?("x86_64"))
                  puts "#{u}|#{f["sha512"]}"
                  exit
                end
              ' "$target_arch"
            }

            local EMPTY_SHA="e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
            local prefer_arm_only="false"
            if grep -q 'depends_on arch: :arm64' "$cask_path"; then
              prefer_arm_only="true"
            fi

            local arm_url="" arm_sha="" intel_url="" intel_sha=""
            while IFS='|' read -r arch_kind dmg_url server_sha; do
              [ -z "$dmg_url" ] && continue
              echo "  → [$arch_kind] $dmg_url"
              local tmp
              tmp=$(mktemp)
              if ! curl -fsSL "$dmg_url" -o "$tmp"; then
                rm -f "$tmp"
                echo "⚠️  $name: [$arch_kind] dmg 下载失败(curl exit 非 0): $dmg_url"
                return 1
              fi
              local bytes sha
              bytes=$(wc -c < "$tmp" | tr -d '[:space:]')
              if [ "${bytes:-0}" -eq 0 ]; then
                rm -f "$tmp"
                echo "⚠️  $name: [$arch_kind] dmg 是空文件(URL 错或 OSS 返回空对象): $dmg_url"
                return 1
              fi
              sha=$(ruby -e "require 'digest'; puts Digest::SHA256.hexdigest(File.binread('$tmp'))")
              rm -f "$tmp"
              if [ "$sha" = "$EMPTY_SHA" ]; then
                echo "⚠️  $name: [$arch_kind] sha256 是空字符串占位,跳过"
                return 1
              fi
              case "$arch_kind" in
                arm)
                  arm_url="$dmg_url"; arm_sha="$sha" ;;
                intel)
                  intel_url="$dmg_url"; intel_sha="$sha" ;;
              esac
              echo "    sha256: $sha ($bytes bytes)"
            done < <(fetch_dmgs "$feed_url" "$prefer_arm_only")

            if [ -z "$arm_url" ] && [ -z "$intel_url" ]; then
              echo "⚠️  $name: yml 里没找到 .dmg"; return 1
            fi
            if [ "$prefer_arm_only" = "true" ] && [ -z "$arm_url" ]; then
              echo "⚠️  $name: cask 是 arm64-only,但 yml 没出 arm64 dmg"; return 1
            fi

            if [ -z "$intel_url" ] && [ -n "$intel_feed_url" ]; then
              echo "  + 缺 intel dmg,补拉另一份 manifest"
              line=$(fetch_dmg_from_arch_feed "$intel_feed_url" "intel" || true)
              if [ -n "$line" ]; then
                intel_url="${line%%|*}"
                tmp=$(mktemp)
                if ! curl -fsSL "$intel_url" -o "$tmp"; then
                  rm -f "$tmp"
                  echo "⚠️  $name: [intel-fallback] dmg 下载失败: $intel_url"
                  return 1
                fi
                bytes=$(wc -c < "$tmp" | tr -d '[:space:]')
                if [ "${bytes:-0}" -eq 0 ]; then
                  rm -f "$tmp"
                  echo "⚠️  $name: [intel-fallback] dmg 是空文件: $intel_url"
                  return 1
                fi
                intel_sha=$(ruby -e "require 'digest'; puts Digest::SHA256.hexdigest(File.binread('$tmp'))")
                rm -f "$tmp"
                if [ "$intel_sha" = "$EMPTY_SHA" ]; then
                  echo "⚠️  $name: [intel-fallback] sha256 是空字符串占位,跳过"; return 1
                fi
                echo "    intel-fallback sha256: $intel_sha ($bytes bytes)"
              fi
            fi

            ruby -i -e '
              path, version, arm_url, arm_sha, intel_url, intel_sha, prefer_arm_only = ARGV
              src = File.read(path)
              src.sub!(/^  version "[^"]+"/, %Q(  version "#{version}"))
              arm_re   = /^(  on_arm do\n)(.*?)(^  end)$/m
              intel_re = /^(  on_intel do\n)(.*?)(^  end)$/m
              if src.match?(arm_re) && src.match?(intel_re)
                src.sub!(arm_re) do |block|
                  b = block
                  b = b.sub(/url "[^"]+"/,     %Q(url "#{arm_url}"))
                  b = b.sub(/sha256 "[^"]+"/,  %Q(sha256 "#{arm_sha}"))
                  b
                end
                src.sub!(intel_re) do |block|
                  b = block
                  b = b.sub(/url "[^"]+"/,     %Q(url "#{intel_url}"))
                  b = b.sub(/sha256 "[^"]+"/,  %Q(sha256 "#{intel_sha}"))
                  b
                end
              else
                target_url = arm_url.empty? ? intel_url : arm_url
                target_sha = arm_sha.empty? ? intel_sha : arm_sha
                src.sub!(/^  url "[^"]+"/,     %Q(  url "#{target_url}"))
                src.sub!(/^  sha256 "[^"]+"/,  %Q(  sha256 "#{target_sha}"))
              end
              File.write(path, src)
            ' "$cask_path" "$latest" \
              "$arm_url" "$arm_sha" \
              "$intel_url" "$intel_sha" \
              "$prefer_arm_only"

            brew style "$cask_path" >/dev/null || { echo "⚠️  $name: brew style 失败,回滚"; git checkout -- "$cask_path"; return 1; }

            local current
            current=$(git show HEAD:"$cask_path" | grep -E '^  version "' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
            git add "$cask_path"
            git commit -m "auto-bump($name): $current → $latest" >/dev/null
            local branch="bump-${name}-${latest}"
            git checkout -B "$branch"
            git push --force-with-lease origin "$branch" >/dev/null
            git checkout main >/dev/null
            echo "✅ $name: 已推到分支 $branch"
          }

          bump_one() {
            local kind="$1" name="$2"
            local flag="--cask"; [ "$kind" = "formula" ] && flag="--formula"
            local bump_cmd="bump-cask-pr"; [ "$kind" = "formula" ] && bump_cmd="bump-formula-pr"

            echo "============================================"
            echo "Livecheck ($kind): $name"
            result=$(HOMEBREW_NO_COLOR=1 brew livecheck "$flag" "$name" 2>&1 || true)
            echo "$result"
            clean=$(echo "$result" | sed -E 's/\x1b\[[0-9;]*m//g')
            matched=$(echo "$clean" | grep -iE "^${name}:" || true)
            latest=$(echo "$matched" | sed -E 's/.*==> *//' | tail -1 | tr -d '[:space:]')
            current=$(echo "$matched" | sed -E 's/^[^:]+: *//; s/ *==>.*//' | tail -1 | tr -d '[:space:]')

            if [ -z "$latest" ] || [ "$latest" = "N/A" ]; then
              echo "⚠️  $name: 查不到最新版本,跳过"
              return
            fi

            echo "当前版本: $current / 最新版本: $latest"

            if [ "$current" = "$latest" ]; then
              echo "✅ $name 已是最新,无需更新"
              return
            fi

            newer=$(printf '%s\n%s\n' "$current" "$latest" | sort -V | tail -1)
            if [ "$newer" != "$latest" ]; then
              echo "✅ $name 配方版本($current)领先上游报告($latest),跳过防止降级"
              return
            fi

            local branch="bump-${name}-${latest}"

            if [ "$kind" = "cask" ] && grep -qE 'strategy :(electron_builder|page_match)' "Casks/${name}.rb"; then
              apply_electron_builder_bump "$name" "$latest" || return
            else
              echo "🚀 $name: $current → $latest,开始 bump"
              style_flag="--no-style"; [ "$kind" = "formula" ] && style_flag=""
              brew "$bump_cmd" "$name" \
                --version="$latest" \
                --message="auto-bump: $current → $latest" \
                --no-audit \
                $style_flag \
                --write-only \
                --commit || { echo "⚠️  $bump_cmd --write-only 失败,见上方日志"; return; }

              git checkout -B "$branch"
              git push --force-with-lease origin "$branch"
              git checkout main
            fi

            if gh pr view "$branch" --json number --state open >/dev/null 2>&1; then
              echo "ℹ️  $name: 已有 OPEN 状态的 PR,跳过"
            else
              pr_body=$(printf '自动同步上游版本。\n\n- 类型: `%s`\n- 旧版本: `%s`\n- 新版本: `%s`\n\n由 GitHub Actions 自动生成并合并。' "$kind" "$current" "$latest")
              pr_url=$(gh pr create --title "bump ${name} ${current} → ${latest}" --body "$pr_body" --base main --head "$branch")
              echo "✅ PR 已创建: $pr_url"
              sleep 2
              if gh pr merge "$branch" --squash --auto --delete-branch 2>&1; then
                echo "✅ PR 已自动合并"
              else
                echo "⚠️  自动合并未成功(可能需要手动 Merge): $pr_url"
              fi
            fi
          }

          for f in Casks/*.rb; do
            bump_one cask "$(basename "$f" .rb)"
          done
          for f in Formula/*.rb; do
            bump_one formula "$(basename "$f" .rb)"
          done

          echo "============================================"
          echo "完成。如有更新,PR 会自动合并到 main(无需人工干预)。"
