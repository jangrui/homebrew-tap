# 自动同步上游版本到本 tap。
#
# 工作流程:
#   1. 每 3 天(UTC 0:00)自动跑一次,也支持手动触发(workflow_dispatch)
#   2. brew livecheck 查询每个 cask 的上游最新版本
#   3. 若版本比 cask 里写的新,用 brew bump-cask-pr 自动算 sha256 + 开 PR
#   4. 你收到 PR 通知,review 后点 Merge 即可
#
# 前置条件:
#   - 仓库已在 GitHub(jangrui/homebrew-tap)
#   - Settings → Actions → General → Workflow permissions 设为 "Read and write"
#     (否则 bump-cask-pr 推不上分支)
name: Auto Bump

on:
  schedule:
    # 每天北京时间 04:00 跑(= UTC 前一天 20:00)
    - cron: "0 20 * * *"
  # 支持在 Actions 页面手动点 "Run workflow" 触发
  workflow_dispatch:

permissions:
  contents: write       # 推 commit 到 bump 分支
  pull-requests: write  # 开 PR

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect & bump changed casks
        env:
          # livecheck / bump-cask-pr 用的 token(带认证,不触发 API 限流)
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gh CLI 在 Actions 里不会自动用 GITHUB_TOKEN,必须显式设 GH_TOKEN
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          # electron-builder / generic-provider feed 的 cask:
          # dmg 文件名含 build 号(例如 Qwen-1.0.5.164.dmg),bump-cask-pr 用 url 模板
          # 拼不出来,直接跑会 404。这里走自定义流程:
          #   1. livecheck 已经从 latest-mac.yml 拿到 version
          #   2. arm64 / x64 两个架构分别重新拉 yml,取 files[].url(dmg 路径)
          #   3. 下载 dmg 算 sha256
          #   4. 直接 ruby 改 cask 文件(version + on_arm/on_intel 的 url + sha256)
          #   5. 推分支(PR 由 bump_one 创建)
          # 假设 livecheck url 是 <feed-root>/<arch>/latest-mac.yml,
          # arm64 ↔ x64 互相替换即可拿另一架构的 feed。
          apply_electron_builder_bump() {
            local name="$1" latest="$2"
            local cask_path="Casks/${name}.rb"
            local feed_url
            feed_url=$(grep -E 'url "[^"]*latest-mac\.yml"' "$cask_path" | head -1 | sed -E 's/.*url "([^"]+)".*/\1/')
            [ -z "$feed_url" ] && { echo "⚠️  $name: 找不到 latest-mac.yml url"; return 1; }
            echo "🚀 $name: electron_builder 路径"

            local arm_feed intel_feed
            if [[ "$feed_url" == *"/arm64/"* ]]; then
              arm_feed="$feed_url"
              intel_feed="${feed_url/\/arm64\///x64/}"
            elif [[ "$feed_url" == *"/x64/"* ]]; then
              intel_feed="$feed_url"
              arm_feed="${feed_url/\/x64\///arm64/}"
            else
              echo "⚠️  $name: feed url 不含 /arm64/ 或 /x64/,无法推导另一架构: $feed_url"
              return 1
            fi

            # 下载 dmg + 算 sha256。返回 "<full-url>|<sha256>"。
            # 注意:必须先下到临时文件再算 sha,直接管道会让 ruby 退出时
            # curl 写一半崩,sha 为空。
            fetch_dmg() {
              local feed="$1"
              local dmg_path sha tmp full_url
              dmg_path=$(curl -fsSL "$feed" | ruby -ryaml -e 'y=YAML.load(STDIN); puts y["files"].map{|f|f["url"]}.find{|u|u.end_with?(".dmg")}')
              [ -z "$dmg_path" ] && { echo "⚠️  yml 里没找到 .dmg"; return 1; }
              full_url="${feed%/latest-mac.yml}/$dmg_path"
              echo "  → dmg: $full_url"
              tmp=$(mktemp)
              curl -fsSL "$full_url" -o "$tmp"
              sha=$(ruby -e "require 'digest'; puts Digest::SHA256.hexdigest(File.binread('$tmp'))")
              rm -f "$tmp"
              echo "${full_url}|${sha}"
            }
            local arm_data intel_data
            arm_data=$(fetch_dmg "$arm_feed") || return 1
            intel_data=$(fetch_dmg "$intel_feed") || return 1
            local arm_url="${arm_data%|*}" arm_sha="${arm_data#*|}"
            local intel_url="${intel_data%|*}" intel_sha="${intel_data#*|}"
            echo "  arm  sha256: $arm_sha"
            echo "  intel sha256: $intel_sha"

            # ruby 改 cask 文件:version + on_arm/on_intel 块各自的 url + sha256
            ruby -i -e '
              path, version, arm_url, arm_sha, intel_url, intel_sha = ARGV
              src = File.read(path)
              src.sub!(/^  version "[^"]+"/, %Q(  version "#{version}"))
              arm_re   = /^(  on_arm do\n)(.*?)(^  end)$/m
              intel_re = /^(  on_intel do\n)(.*?)(^  end)$/m
              src.sub!(arm_re) do |block|
                b = block
                b = b.sub(/url "[^"]+"/,     %Q(url "#{arm_url}"))
                b = b.sub(/sha256 "[^"]+"/,  %Q(sha256 "#{arm_sha}"))
                b
              end
              src.sub!(intel_re) do |block|
                b = block
                b = b.sub(/url "[^"]+"/,     %Q(url "#{intel_url}"))
                b = b.sub(/sha256 "[^"]+"/,  %Q(sha256 "#{intel_sha}"))
                b
              end
              File.write(path, src)
            ' "$cask_path" "$latest" \
              "$arm_url" "$arm_sha" \
              "$intel_url" "$intel_sha"

            # brew style 把关,过不了就别提交
            brew style "$cask_path" >/dev/null || { echo "⚠️  $name: brew style 失败,回滚"; git checkout -- "$cask_path"; return 1; }

            local current
            current=$(git show HEAD:"$cask_path" | grep -E '^  version "' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
            git add "$cask_path"
            git commit -m "auto-bump($name): $current → $latest" >/dev/null
            local branch="bump-${name}-${latest}"
            git checkout -B "$branch"
            git push --force-with-lease origin "$branch" >/dev/null
            git checkout main >/dev/null
            echo "✅ $name: 已推到分支 $branch"
          }

          # 通用处理函数:对单个 cask 或 formula 执行 livecheck + bump + PR。
          # 参数:$1=类型(cask|formula)  $2=名字
          bump_one() {
            local kind="$1" name="$2"
            local flag="--cask"; [ "$kind" = "formula" ] && flag="--formula"
            local bump_cmd="bump-cask-pr"; [ "$kind" = "formula" ] && bump_cmd="bump-formula-pr"

            echo "============================================"
            echo "Livecheck ($kind): $name"
            # livecheck 输出格式:  <name>: <current> ==> <latest>
            result=$(HOMEBREW_NO_COLOR=1 brew livecheck "$flag" "$name" 2>&1 || true)
            echo "$result"
            # 剥 ANSI 转义码(防 NO_COLOR 不生效)。grep 加 || true 避免 set -e 下无匹配退出。
            clean=$(echo "$result" | sed -E 's/\x1b\[[0-9;]*m//g')
            matched=$(echo "$clean" | grep -iE "^${name}:" || true)
            latest=$(echo "$matched" | sed -E 's/.*==> *//' | tail -1 | tr -d '[:space:]')
            current=$(echo "$matched" | sed -E 's/^[^:]+: *//; s/ *==>.*//' | tail -1 | tr -d '[:space:]')

            if [ -z "$latest" ] || [ "$latest" = "N/A" ]; then
              echo "⚠️  $name: 查不到最新版本,跳过"
              return
            fi

            echo "当前版本: $current / 最新版本: $latest"

            if [ "$current" = "$latest" ]; then
              echo "✅ $name 已是最新,无需更新"
              return
            fi

            local branch="bump-${name}-${latest}"

            # electron-builder generic-provider feed 的 cask 走自定义流程。
            # bump-cask-pr 用 url 模板拼路径,但这些 cask 的 dmg 名含 build 号,
            # 模板拼出来的 url 404。判断条件:cask 里写了 strategy :electron_builder。
            if [ "$kind" = "cask" ] && grep -q 'strategy :electron_builder' "Casks/${name}.rb"; then
              apply_electron_builder_bump "$name" "$latest" || return
            else
              echo "🚀 $name: $current → $latest,开始 bump"
              # bump-*-pr 自己开 PR 要 classic 'repo' scope,GITHUB_TOKEN 没有。
              # 改用 --write-only --commit 让它只改文件+本地 commit,
              # 我们自己 git push 分支 + gh pr create 开 PR(认精细权限)。
              # 注意:--no-style 只在 bump-cask-pr 支持,bump-formula-pr 不支持,
              # 所以仅 cask 路径传,formula 路径省略(否则会报 invalid option)。
              style_flag="--no-style"; [ "$kind" = "formula" ] && style_flag=""
              brew "$bump_cmd" "$name" \
                --version="$latest" \
                --message="auto-bump: $current → $latest" \
                --no-audit \
                $style_flag \
                --write-only \
                --commit || { echo "⚠️  $bump_cmd --write-only 失败,见上方日志"; return; }

              git checkout -B "$branch"
              git push --force-with-lease origin "$branch"
              git checkout main
            fi

            # 已存在 OPEN 状态的同名 PR 则跳过(避免重复开)。
            # 注意:只查 --state open,否则已 merged 的旧 PR 也会被匹配到,导致永远跳过。
            if gh pr view "$branch" --json number --state open >/dev/null 2>&1; then
              echo "ℹ️  $name: 已有 OPEN 状态的 PR,跳过"
            else
              pr_body=$(printf '自动同步上游版本。\n\n- 类型: `%s`\n- 旧版本: `%s`\n- 新版本: `%s`\n\n由 GitHub Actions 自动生成并合并。' "$kind" "$current" "$latest")
              pr_url=$(gh pr create --title "bump ${name} ${current} → ${latest}" --body "$pr_body" --base main --head "$branch")
              echo "✅ PR 已创建: $pr_url"
              # 自动合并(squash)。--auto:无分支保护时立即合并;有分支保护时等检查通过后合并。
              # 需要 allow_auto_merge=true(已通过 API 开启)。
              sleep 2
              if gh pr merge "$branch" --squash --auto --delete-branch 2>&1; then
                echo "✅ PR 已自动合并"
              else
                echo "⚠️  自动合并未成功(可能需要手动 Merge): $pr_url"
              fi
            fi
          }

          # 遍历所有 cask 和 formula。以后新增配方无需改这个 workflow。
          for f in Casks/*.rb; do
            bump_one cask "$(basename "$f" .rb)"
          done
          for f in Formula/*.rb; do
            bump_one formula "$(basename "$f" .rb)"
          done

          echo "============================================"
          echo "完成。如有更新,PR 会自动合并到 main(无需人工干预)。"
