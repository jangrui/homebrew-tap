# 自动同步上游版本到本 tap。
#
# 工作流程:
#   1. 每 3 天(UTC 0:00)自动跑一次,也支持手动触发(workflow_dispatch)
#   2. brew livecheck 查询每个 cask 的上游最新版本
#   3. 若版本比 cask 里写的新,用 brew bump-cask-pr 自动算 sha256 + 开 PR
#   4. 你收到 PR 通知,review 后点 Merge 即可
#
# 前置条件:
#   - 仓库已在 GitHub(jangrui/homebrew-tap)
#   - Settings → Actions → General → Workflow permissions 设为 "Read and write"
#     (否则 bump-cask-pr 推不上分支)
name: Auto Bump

on:
  schedule:
    # 每 3 天 UTC 0:00 跑一次(北京/上海时间 08:00)。cron 只有 5 段。
    - cron: "0 0 */3 * *"
  # 支持在 Actions 页面手动点 "Run workflow" 触发
  workflow_dispatch:

permissions:
  contents: write       # 推 commit 到 bump 分支
  pull-requests: write  # 开 PR

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect & bump changed casks
        env:
          # 给 livecheck/bump-cask-pr 用的 GitHub token,带认证不会触发 API 限流
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # 遍历仓库里的所有 cask。以后新增 cask 无需改这个 workflow,会自动覆盖。
          shopt -s nullglob
          casks=()
          for f in Casks/*.rb; do
            casks+=("$(basename "$f" .rb)")
          done

          if [ ${#casks[@]} -eq 0 ]; then
            echo "没有找到任何 cask,退出。"
            exit 0
          fi

          echo "检测到 casks: ${casks[*]}"

          for cask in "${casks[@]}"; do
            echo "============================================"
            echo "Livecheck: $cask"
            # livecheck 实测输出格式:  maccalendar: 1.6.11 ==> 1.6.11
            #   - ==> 左边是 cask 里写的当前版本,右边是上游最新版本
            #   - 取 ==> 后面的部分作为 latest
            # 用 HOMEBREW_NO_COLOR 关掉颜色码,用 grep -i 容错大小写。
            result=$(HOMEBREW_NO_COLOR=1 brew livecheck --cask "$cask" 2>&1 || true)
            echo "$result"
            # 先剥 ANSI 转义码(双重保险,防 NO_COLOR 不生效),grep 加 || true 避免 set -e 下无匹配退出
            clean=$(echo "$result" | sed -E 's/\x1b\[[0-9;]*m//g')
            matched=$(echo "$clean" | grep -iE "^${cask}:" || true)
            latest=$(echo "$matched" | sed -E 's/.*==> *//' | tail -1 | tr -d '[:space:]')
            current=$(echo "$matched" | sed -E 's/^[^:]+: *//; s/ *==>.*//' | tail -1 | tr -d '[:space:]')

            if [ -z "$latest" ] || [ "$latest" = "N/A" ]; then
              echo "⚠️  $cask: 查不到最新版本,跳过"
              continue
            fi

            echo "当前版本: $current / 最新版本: $latest"

            if [ "$current" = "$latest" ]; then
              echo "✅ $cask 已是最新,无需更新"
              continue
            fi

            echo "🚀 $cask: $current → $latest,开始 bump"
            # 注意:bump-cask-pr 自己开 PR 时要求 token 有 classic 'repo' scope,
            # 而 GITHUB_TOKEN 用的是精细权限模型,会被拒绝("Scopes required: repo")。
            # 解决:bump-cask-pr 只负责改文件+提交本地(--write-only --commit),
            # 我们自己推分支 + 用 gh pr create 开 PR(认精细权限)。
            brew bump-cask-pr "$cask" \
              --version="$latest" \
              --message="auto-bump: $current → $latest" \
              --no-audit \
              --no-style \
              --write-only \
              --commit || { echo "⚠️  bump-cask-pr --write-only 失败,见上方日志"; continue; }

            branch="bump-${cask}-${latest}"
            git checkout -B "$branch"
            git push --force-with-lease origin "$branch"
            git checkout main

            # 已存在同名 PR 则跳过(避免重复开)。body 用 printf 生成,避开 YAML 多行缩进陷阱。
            if gh pr view "$branch" --json number >/dev/null 2>&1; then
              echo "ℹ️  $cask: PR 已存在,跳过"
            else
              pr_body=$(printf '自动同步上游版本。\n\n- 旧版本: `%s`\n- 新版本: `%s`\n\n由 GitHub Actions 自动生成(bump-cask-pr 改文件 + gh pr create 开 PR)。' "$current" "$latest")
              gh pr create --title "bump ${cask} ${current} → ${latest}" --body "$pr_body" --base main --head "$branch" && echo "✅ PR 已创建"
            fi
          done

          echo "============================================"
          echo "完成。如有更新,请在 https://github.com/${GITHUB_REPOSITORY}/pulls review PR。"
